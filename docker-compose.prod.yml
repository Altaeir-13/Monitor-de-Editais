x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-backend-environment: &backend-environment
  DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-monitor_editais}"
  SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required}"
  ALGORITHM: "${ALGORITHM:-HS256}"
  ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}"
  ENVIRONMENT: "${ENVIRONMENT:-staging}"
  API_ROOT_PATH: "${API_ROOT_PATH:-/api}"
  OPENAPI_ENABLED: "${OPENAPI_ENABLED:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"
  UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
  FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-*}"
  SMTP_HOST: "${SMTP_HOST:-localhost}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_TLS: "${SMTP_TLS:-true}"
  SMTP_USER: "${SMTP_USER:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL:-no-reply@example.com}"
  BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:?BACKEND_CORS_ORIGINS is required}"
  CRAWLER_SCHEDULER_ENABLED: "${CRAWLER_SCHEDULER_ENABLED:-false}"
  CRAWLER_INTERVAL_MINUTES: "${CRAWLER_INTERVAL_MINUTES:-360}"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-monitor_editais}"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data

  migrate:
    build: *backend-build
    image: "monitor-editais-backend:${IMAGE_TAG:-staging}"
    restart: "no"
    entrypoint: ["alembic"]
    command: ["upgrade", "head"]
    environment: *backend-environment
    depends_on:
      db:
        condition: service_healthy
    networks:
      - data

  backend:
    build: *backend-build
    image: "monitor-editais-backend:${IMAGE_TAG:-staging}"
    restart: unless-stopped
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - edge
      - data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-/api}"
    image: "monitor-editais-frontend:${IMAGE_TAG:-staging}"
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - type: bind
        source: "${TLS_CERT_DIRECTORY:?TLS_CERT_DIRECTORY is required}"
        target: /etc/nginx/tls
        read_only: true
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - edge

volumes:
  postgres_prod_data:

networks:
  edge:
    driver: bridge
  data:
    driver: bridge
    internal: true
